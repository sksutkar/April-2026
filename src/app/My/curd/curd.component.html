<div class="user-form-container">
    <h2>User Form</h2>

    <form [formGroup]="userForm" (ngSubmit)="submit()">

        
        <div class="mb-3">
            <label>User Name</label>
            <input type="text" class="form-control" formControlName="userName">
            <div class="text-danger" *ngIf="userForm.get('userName')?.touched && userForm.get('userName')?.invalid">
                User Name is required
            </div>
        </div>

        
        <div class="mb-3">
            <label>Mobile No</label>
            <input type="text" class="form-control" formControlName="phoneNo">
            <div class="text-danger" *ngIf="userForm.get('phoneNo')?.touched && userForm.get('phoneNo')?.invalid">
                Mobile number is required
            </div>
        </div>

        
        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" formControlName="email">
            <div class="text-danger" *ngIf="userForm.get('email')?.touched && userForm.get('email')?.invalid">
                Valid Email is required
            </div>
        </div>

        
        <div class="mb-3">
            <label>Gender </label><br>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" value="male" formControlName="gender">
                <label class="form-check-label">Male</label>
            </div>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" value="female" formControlName="gender">
                <label class="form-check-label">Female</label>
            </div>

            <div class="text-danger" *ngIf="userForm.get('gender')?.touched && userForm.get('gender')?.invalid">
                Please select gender
            </div>
        </div>

        <button type="submit" class="btn btn-primary" [disabled]="userForm.invalid">
            Submit
        </button>

        <button type="button" class="btn btn-secondary m-2" (click)="navigateTo()">
            User List
        </button>

    </form>
</div>
